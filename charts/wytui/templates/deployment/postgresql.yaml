{{- if .Values.postgresql.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wytui-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    app: wytui-postgresql
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wytui-postgresql
  template:
    metadata:
      labels:
        app: wytui-postgresql
    spec:
      containers:
      - name: postgresql
        image: {{ .Values.postgresql.image }}
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
{{- if .Values.postgresql.secret.existing }}
          valueFrom:
            secretKeyRef:
              name: {{ .Values.postgresql.secret.name }}
              key: {{ .Values.postgresql.secret.usernameKey }}
{{- else }}
          value: {{ .Values.postgresql.secret.username | quote }}
{{- end }}
        - name: POSTGRES_PASSWORD
{{- if .Values.postgresql.secret.existing }}
          valueFrom:
            secretKeyRef:
              name: {{ .Values.postgresql.secret.name }}
              key: {{ .Values.postgresql.secret.passwordKey }}
{{- else }}
          value: {{ .Values.postgresql.secret.password | quote }}
{{- end }}
        - name: POSTGRES_DB
          value: {{ .Values.postgresql.database | quote }}
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - {{ .Values.postgresql.secret.username }}
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - {{ .Values.postgresql.secret.username }}
          initialDelaySeconds: 15
          periodSeconds: 10
        volumeMounts:
        - name: postgresql-data
          mountPath: /var/lib/postgresql/data
          {{- if .Values.postgresql.persistent.subPath }}
          subPath: {{ .Values.postgresql.persistent.subPath }}
          {{- end }}
      volumes:
      - name: postgresql-data
        persistentVolumeClaim:
          claimName: {{ .Values.postgresql.persistent.existingClaim | default "wytui-postgresql" }}
{{- end }}
